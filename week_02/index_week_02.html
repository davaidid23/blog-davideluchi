<!DOCTYPE html> 
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compito Settimana 2</title>
    <link rel="stylesheet" href="style_week_02.css">
    
    <script>
      window.MathJax = {
        tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] }
      };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f9; padding: 20px; }
        .project-container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        
        .output-console {
            background: #1e1e1e;
            color: #00ff00;
            padding: 15px;
            font-family: 'Consolas', 'Monaco', monospace;
            text-align: left;
            border-radius: 5px;
            margin-top: 15px;
            white-space: pre-wrap;
            min-height: 120px;
            border: 1px solid #333;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .btn {
            padding: 10px 20px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            transition: opacity 0.2s;
        }

        .btn:hover { opacity: 0.9; }

        #btn-test-normale { background: #27ae60; color: white; }
        #btn-test-difficile { background: #c0392b; color: white; }
        #btn-scarica-csv { background: #2980b9; color: white; } 

        .chart-container {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        /* 🔧 FIX GRAFICI */
        .chart-box {
            flex: 1;
            min-width: 300px;
            background: #fff;
            border: 1px solid #ccc;
            padding: 10px;
            border-radius: 5px;

            height: 350px;

            display: flex;
            flex-direction: column;
        }

        .chart-box canvas {
            flex: 1;
        }

        .control-panel {
            text-align: center;
            margin: 20px 0;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            border: 1px dashed #ccc;
        }

        select {
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #ccc;
            font-size: 1rem;
        }

        .project-footer {
            margin-top: 40px;
            font-size: 0.8em;
            color: #7f8c8d;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="project-container">
        <a href="../index.html" class="back-btn">← Torna al Blog</a>
        
        <header>
            <h1>Progetto Settimana 2</h1>
        </header>

        <section class="content">
            <h2>Esercizio 1</h2>
            <div class="box">
                <div class="btn-group">
                    <button id="btn-test-normale" class="btn">Test numeri "per bene"</button>
                    <button id="btn-test-difficile" class="btn">Test numeri problematici</button>
                    <button id="btn-scarica-csv" class="btn">📥 Scarica i dati</button>
                </div>
                <div id="output-algoritmi" class="output-console"></div>
            </div>
        </section>

        <section class="content">
            <h2>Esercizio 2</h2>

            <div class="control-panel">
                <input type="number" id="input-campioni" value="10000">
                <select id="select-distribuzione">
                    <option value="normale">Normale</option>
                    <option value="esponenziale">Esponenziale</option>
                    <option value="cauchy">Cauchy</option>
                    <option value="pareto">Pareto</option>
                    <option value="triangolare">Triangolare</option>
                    <option value="binomiale">Binomiale</option>
                    <option value="poisson">Poisson</option>
                    <option value="chi_quadro">Chi-Quadro</option>
                </select>
                <button id="btn-genera-dist" class="btn">Genera</button>
            </div>

            <div class="chart-container">
                <div class="chart-box">
                    <h4>Input</h4>
                    <canvas id="chart-uniforme"></canvas>
                </div>
                <div class="chart-box">
                    <h4 id="titolo-output">Output</h4>
                    <canvas id="chart-output"></canvas>
                </div>
            </div>
        </section>

        <script src="funzioni_week_02.js"></script>
</body>
</html>
